<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Events Volunteer</title>
  <link rel="stylesheet" href="beach.css"> <!-- reuse same CSS -->
</head>
<body>

<div class="container">

  <div class="form-box">

    <h2>💻 Tech Events Volunteer Profile</h2>
    <p class="subtitle">Showcase your skills and passion</p>

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Location</label>
      <input type="text" placeholder="City, Country">
    </div>

    <div class="input-group">
      <label>Skills</label>
      <input type="text" placeholder="Coding, UI/UX, AI, Web Dev">
    </div>

    <div class="input-group">
      <label>Availability</label>
      <select>
        <option>Select availability</option>
        <option>Weekends</option>
        <option>Full-Time</option>
        <option>Remote</option>
      </select>
    </div>

    <!-- 🔥 CUSTOM STORY -->
    <div class="input-group">
      <label>Your Story</label>
      <textarea placeholder="Tell your story... What tech skills do you have? Why do you want to participate in tech events or hackathons? What problems do you want to solve?"></textarea>
    </div>

    <button onclick="submitProfile()"> Submit Profile</button>

  </div>

</div>

<script src="tech.js"></script>
</body>
</html>
