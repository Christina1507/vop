<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Volunteer Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #a18cd1);
}

.container {
    display: flex;
    width: 850px;
    height: 500px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* LEFT PANEL */
.left {
    flex: 1;
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(160deg, #ff758c, #7f7fd5);
}

.left h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.left p {
    font-size: 14px;
    opacity: 0.9;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    background: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* ROLE SWITCH */
.role-toggle {
    display: flex;
    background: #f2f2f2;
    border-radius: 50px;
    margin-bottom: 20px;
    overflow: hidden;
}

.role-toggle button {
    flex: 1;
    padding: 10px;
    border: none;
    cursor: pointer;
    background: transparent;
    transition: 0.3s;
}

.role-toggle button.active {
    background: linear-gradient(135deg, #ff758c, #7f7fd5);
    color: white;
    font-weight: 600;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
}

input {
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

input:focus {
    border-color: #7f7fd5;
    box-shadow: 0 0 8px rgba(127,127,213,0.3);
    outline: none;
}

button.login-btn {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff758c, #7f7fd5);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button.login-btn:hover {
    transform: scale(1.05);
}

/* LINKS */
.extra {
    margin-top: 10px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
}

.extra a {
    text-decoration: none;
    color: #7f7fd5;
}

.extra a:hover {
    text-decoration: underline;
}

/* ANIMATION */
.container {
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Welcome to ImpactHub </h1>
        <p>Where your time creates real change. Join hands, make a difference.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="role-toggle">
            <button class="active" onclick="setRole('volunteer', this)">Volunteer</button>
            <button onclick="setRole('ngo', this)">Organization</button>
        </div>

        <form id="loginForm">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="login-btn">Login</button>

            <div class="extra">
                <a href="#">Forgot Password?</a>
                <a href="#">Sign Up</a>
            </div>
        </form>

    </div>

</div>

<script>

let selectedRole = "volunteer"; // default

function setRole(role, el) {
    selectedRole = role;

    document.querySelectorAll(".role-toggle button").forEach(btn => {
        btn.classList.remove("active");
    });
    el.classList.add("active");
}


document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); // stop reload

    if (selectedRole === "volunteer") {
        window.location.href = "index.html";
    } else {
        window.location.href = "org.html";
    }
});

</script>

</body>
</html>
