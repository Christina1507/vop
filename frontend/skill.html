<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skill Exchange</title>
  <link rel="stylesheet" href="beach.css">
</head>
<body>

<div class="container">

  <div class="form-box">

    <h2> Skill Exchange Profile</h2>
    <p class="subtitle">Share your skills and learn from others</p>

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Location</label>
      <input type="text" placeholder="City, Country">
    </div>

    
    <div class="input-group">
      <label>Skills You Offer</label>
      <input type="text" placeholder="Coding, Design, Photography, Teaching">
    </div>

    
    <div class="input-group">
      <label>Skills You Want to Learn</label>
      <input type="text" placeholder="Public Speaking, AI, Marketing">
    </div>

    <div class="input-group">
      <label>Availability</label>
      <select>
        <option>Select availability</option>
        <option>Weekends</option>
        <option>Flexible</option>
        <option>Remote</option>
      </select>
    </div>

    
    <div class="input-group">
      <label>Your Story</label>
      <textarea placeholder="Tell your story... What skills can you teach? What do you want to learn? How can you collaborate with others?"></textarea>
    </div>

    <button onclick="submitProfile()"> Join Skill Exchange</button>

  </div>

</div>

<script src="skill.js"></script>
</body>
</html>
