<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ImpactHub</title>
  <link rel="stylesheet" href="category.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Welcome to ImpactHub </h1>
    <p>
      Where your time creates real change.<br>
      Join hands, make a difference.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>Explore Opportunities</h2>

    <div class="scroll-row">

      <div class="card beach" onclick="goToPage('beach.html')">
        <div class="overlay"></div>
        <h3>Beach Cleanups</h3>
        <p>Protect oceans </p>
      </div>

      <div class="card tech" onclick="goToPage('tech.html')">
        <div class="overlay"></div>
        <h3>Tech Events</h3>
        <p>Hackathons </p>
      </div>

      <div class="card ngo" onclick="goToPage('ngo.html')">
        <div class="overlay"></div>
        <h3>NGOs</h3>
        <p>Social impact </p>
      </div>

      <div class="card emergency" onclick="goToPage('emergency.html')">
        <div class="overlay"></div>
        <h3>Emergency</h3>
        <p>Crisis response </p>
      </div>

      <div class="card skill" onclick="goToPage('skill.html')">
        <div class="overlay"></div>
        <h3>Skill Exchange</h3>
        <p>Teach & Learn </p>
      </div>

    </div>
  </div>

</div>

<script src="category.js"></script>
</body>
</html>
