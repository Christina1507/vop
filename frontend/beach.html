<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beach Volunteer</title>
  <link rel="stylesheet" href="beach.css">
</head>
<body>

<div class="container">

  <div class="form-box">

    <h2> Beach Cleanup Profile</h2>
    <p class="subtitle">Let organizations discover you</p>

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Location</label>
      <input type="text" placeholder="City, Country">
    </div>

    <div class="input-group">
      <label>Skills</label>
      <input type="text" placeholder="First Aid, Teamwork, Leadership">
    </div>

    <div class="input-group">
      <label>Availability</label>
      <select>
        <option>Select availability</option>
        <option>Weekends</option>
        <option>Full-Time</option>
        <option>Remote</option>
      </select>
    </div>

   
    <div class="input-group">
      <label>Your Story</label>
      <textarea placeholder="Tell your story... Why do you care about beach cleanups? What impact do you want to create?"></textarea>
    </div>

    <button onclick="submitProfile()"> Submit Profile</button>

  </div>

</div>

<script src="beach.js"></script>
</body>
</html>
