<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emergency Volunteer</title>
  <link rel="stylesheet" href="beach.css">
</head>
<body>

<div class="container">

  <div class="form-box">

    <h2>🚨 Emergency Response Volunteer</h2>
    <p class="subtitle">Be ready to act when it matters most</p>

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Location</label>
      <input type="text" placeholder="City, Country">
    </div>

    <div class="input-group">
      <label>Skills</label>
      <input type="text" placeholder="First Aid, Rescue, Crisis Management">
    </div>

    <div class="input-group">
      <label>Availability</label>
      <select>
        <option>Select availability</option>
        <option>Immediate Response</option>
        <option>Weekends</option>
        <option>Full-Time</option>
      </select>
    </div>

    
    <div class="input-group">
      <label>Your Story</label>
      <textarea placeholder="Tell your story... Have you handled emergency situations before? Why do you want to help in crisis situations? How do you stay calm under pressure?"></textarea>
    </div>

    <button onclick="submitProfile()"> Join Emergency Response</button>

  </div>

</div>

<script src="emergency.js"></script>
</body>
</html>
